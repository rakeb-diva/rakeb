<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="rakeb.css">
<title>Alazar Solomon | Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 10%;
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(5px);
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;

    animation: fadeIn 2s ease-in-out;
}

.hero h1 {
    font-size: 50px;
}

.hero span {
    color: #38bdf8;
}

.hero button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.4s;
}

.hero button:hover {
    transform: scale(1.1);
    background: white;
}

/* SECTIONS */
section {
    padding: 80px 10%;
    text-align: center;
    opacity: 0;
    transform: translateY(50px);
    animation: slideUp 1.5s forwards;
}

section:nth-child(2) { animation-delay: 0.5s; }
section:nth-child(3) { animation-delay: 1s; }

.projects {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 250px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
    background: #38bdf8;
    color: black;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

</style>
</head>

<body>

<nav>
    <h2>rakeb</h2>
    <div>
      <img src="cutie.PNG" alt="cutie.PNG">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="hero">
    <h1>Hello, I'm <span>rakeb Solomon</span></h1>
    <p>Frontend Developer & Creative Designer</p>
    <button onclick="location.href='#projects'">View My Work</button>
</div>

<section id="about">
    <h2>About Me</h2>
    <p>I create modern, responsive, and animated websites.</p>
</section>

<section id="projects">
    <h2>My Projects</h2>
    <div class="projects">
        <div class="card">Project One</div>
        <div class="card">Project Two</div>
        <div class="card">Project Three</div>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <p>Email: your@rakeb.com</p>
</section>

<footer>
    © 2026 rakeb Solomon
</footer>

</body>
</html>
